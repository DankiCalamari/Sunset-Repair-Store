# API Gateway Configuration for Sunset Country Repairs
# This nginx instance sits between the public website and the private Repair API

upstream repair_api {
    server localhost:8000;
}

server {
    listen 8080;
    server_name localhost 127.0.0.1;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;

    # Request size limits
    client_max_body_size 10M;

    # Logging
    log_format api_gateway '$remote_addr - $remote_user [$time_local] '
                          '"$request" $status $body_bytes_sent '
                          '"$http_referer" "$http_user_agent" '
                          'api_key=$http_x_api_key duration=$request_time';
    access_log /var/log/nginx/api_gateway/access.log api_gateway;
    error_log /var/log/nginx/api_gateway/error.log;

    # Health check endpoint (no auth required)
    location /health {
        proxy_pass http://repair_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # API endpoints - require X-API-Key header
    location /api/ {
        # Rate limiting
        limit_req zone=api_limit burst=50 nodelay;

        # Validate API key
        if ($http_x_api_key = "") {
            return 401 "Missing X-API-Key header";
        }

        # Forward to Repair API
        proxy_pass http://repair_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-API-Key $http_x_api_key;

        # Request validation
        if ($request_method !~ ^(GET|POST|PUT|PATCH|DELETE)$) {
            return 405;
        }

        # CORS for frontend
        if ($http_origin ~* "^https?://(repairshop|public)\.sunsetcountry\.repair$") {
            add_header Access-Control-Allow-Origin $http_origin;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key, X-Request-ID";
            add_header Access-Control-Max-Age 86400;
        }
    }

    # Catch-all for API requests
    location /api {
        limit_req zone=api_limit burst=50 nodelay;

        if ($http_x_api_key = "") {
            return 401 "Missing X-API-Key header";
        }

        proxy_pass http://repair_api/api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-API-Key $http_x_api_key;
    }
}
