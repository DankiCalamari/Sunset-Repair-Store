services:
  db:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sunset}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sunset_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-sunset_erp}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sunset} -d ${POSTGRES_DB:-sunset_erp}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://sunset:sunset_dev_password@db:5432/sunset_erp}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      API_GATEWAY_SECRET: ${API_GATEWAY_SECRET:-}
    networks:
      - app_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - ./backend/app:/app/app:ro

  api-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile.api-gateway
    env_file:
      - .env
    environment:
      - API_GATEWAY_SECRET=${API_GATEWAY_SECRET:-}
    networks:
      - app_network
    ports:
      - "8080:8080"
    depends_on:
      - api

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      VITE_API_URL: ${VITE_API_URL:-/api}
    networks:
      - app_network
    depends_on:
      - api-gateway
    ports:
      - "5173:5173"

  public-website:
    build:
      context: ./frontend
      dockerfile: Dockerfile.public
    env_file:
      - .env
    environment:
      VITE_API_URL: ${PUBLIC_API_URL:-http://api-gateway:8080/api}
      VITE_PUBLIC_API_KEY: ${PUBLIC_API_KEY:-}
    networks:
      - app_network
    depends_on:
      - api
    ports:
      - "3000:3001"
    restart: unless-stopped

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
  minio_data: